<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes"
    />

    <title>NewZmeika3D</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      #unity-container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        background: #000;
      }

      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
        background: #000;
      }

      /* Никакого loader-а */
      #unity-loading {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>

    <script>
          const canvas = document.querySelector("#unity-canvas");

          const config = {
            dataUrl: "Build/SnakeWebGL.data",
            frameworkUrl: "Build/SnakeWebGL.framework.js",
            codeUrl: "Build/SnakeWebGL.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "NewZmeika3D",
            productVersion: "0.1.0",
            matchWebGLToCanvasSize: true,
            devicePixelRatio: 1
          };

          function resizeCanvas() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.style.width = "100%";
            canvas.style.height = "100%";
          }

          window.addEventListener("resize", resizeCanvas);
          resizeCanvas();

          const loaderUrl = "Build/SnakeWebGL.loader.js";
          const script = document.createElement("script");
          script.src = loaderUrl;

          script.onload = () => {
            createUnityInstance(canvas, config, () => {
              // Пустой onProgress — ничего не показываем
            }).then((unityInstance) => {
              window.unityInstance = unityInstance;
            }).catch((message) => {
              console.error(message);
              alert(message);
            });
          };

          document.body.appendChild(script);
    </script>
  </body>
</html>
