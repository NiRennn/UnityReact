<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Unity Web Player | NewZmeika3D</title>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #231f20;
      }

      body {
        position: relative;
        text-align: left;
      }

      #unity-canvas {
        display: block;
        width: 100vw;
        height: 100dvh;
        background: #231f20;
      }

      @supports not (height: 100dvh) {
        #unity-canvas {
          height: 100vh;
        }
      }

      #unity-loader {
        position: absolute;
        inset: 0;
        z-index: 10;
        background: #231f20;
      }

      #unity-loader img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        background: #231f20;
      }

      #unity-loader.hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="unity-loader">
      <img src="loader.jpg" alt="Loading" />
    </div>

    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/SnakeWebGL.loader.js"></script>
<script>
  const canvas = document.querySelector("#unity-canvas");
  const loader = document.querySelector("#unity-loader");

  createUnityInstance(canvas, {
    arguments: [],
    dataUrl: "Build/SnakeWebGL.data",
    frameworkUrl: "Build/SnakeWebGL.framework.js",
    codeUrl: "Build/SnakeWebGL.wasm",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "DefaultCompany",
    productName: "NewZmeika3D",
    productVersion: "0.1.0",
  })
    .then((unityInstance) => {
      window.hideUnityLoader = function () {
        loader.classList.add("hidden");
      };
    })
    .catch((message) => {
      alert(message);
    });
</script>
  </body>
</html>
